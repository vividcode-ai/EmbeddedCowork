name: Manual NPM Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: false
        default: latest
        type: string
  workflow_call:
    inputs:
      ref:
        required: false
        default: ""
        type: string
      version:
        required: true
        type: string
      dist_tag:
        required: false
        type: string
        default: latest
      tag:
        description: "Git tag to upload server binaries to (GitHub Release)"
        required: false
        type: string
        default: ""
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    env:
      NODE_VERSION: 22
      PUBLISH_NPM_VERSION: 11.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Prepare pinned npm CLI
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/publish-npm"
          mkdir -p "$tool_dir"
          npm install --prefix "$tool_dir" "npm@${PUBLISH_NPM_VERSION}" --no-audit --no-fund
          echo "PINNED_NPM_CLI=$tool_dir/node_modules/npm/bin/npm-cli.js" >> "$GITHUB_ENV"
          node "$tool_dir/node_modules/npm/bin/npm-cli.js" --version

      - name: Install dependencies
        run: node "$PINNED_NPM_CLI" ci --workspaces

      - name: Ensure rollup native binary
        run: node "$PINNED_NPM_CLI" install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build server package (includes UI bundling)
        run: node "$PINNED_NPM_CLI" run build --workspace packages/server

      - name: Build platform binaries (cross-compile all targets)
        run: node "$PINNED_NPM_CLI" run build:platforms --workspace packages/server

      - name: Set publish metadata
        shell: bash
        run: |
          VERSION_INPUT="${{ inputs.version }}"
          if [ -z "$VERSION_INPUT" ]; then
            VERSION_INPUT=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION_INPUT" >> "$GITHUB_ENV"
          echo "DIST_TAG=${{ inputs.dist_tag || 'latest' }}" >> "$GITHUB_ENV"

      - name: Upload server binaries to GitHub Release
        if: ${{ inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for pkg in darwin-x64 darwin-arm64 win32-x64 linux-x64; do
            bin_dir="packages/server/publish-packages/$pkg/bin"
            src=$(ls "$bin_dir"/embeddedcowork-server* 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              ext=""
              [ "$pkg" = "win32-x64" ] && ext=".exe"
              asset_name="embeddedcowork-server-${VERSION}-${pkg}${ext}"
              cp "$src" "/tmp/$asset_name"
              echo "Uploading $asset_name to release ${{ inputs.tag }}"
              gh release upload "${{ inputs.tag }}" "/tmp/$asset_name" --clobber
            fi
          done

      - name: Bump package versions for publish
        run: node "$PINNED_NPM_CLI" version ${VERSION} --workspaces --include-workspace-root --no-git-tag-version --allow-same-version
        env:
          NPM_CONFIG_FETCH_RETRIES: 5
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; attempting npm trusted publishing (OIDC)"
            unset NODE_AUTH_TOKEN
          fi
          for pkg in darwin-x64 darwin-arm64 win32-x64 linux-x64; do
            echo "Publishing packages/server/publish-packages/$pkg ..."
            node "$PINNED_NPM_CLI" publish \
              --workspace packages/server/publish-packages/$pkg \
              --access public \
              --provenance || true
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; attempting npm trusted publishing (OIDC)"
            unset NODE_AUTH_TOKEN
          fi
          node "$PINNED_NPM_CLI" publish \
            --workspace packages/server \
            --access public \
            --tag ${DIST_TAG} \
            --provenance
