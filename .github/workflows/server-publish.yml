name: Server Publish (Bun)

on:
  push:
    branches:
      - main
    paths:
      - 'packages/server/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 22

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci --workspaces --include=optional

      - name: Ensure rollup native binary
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build server (includes UI bundling)
        run: npm run build --workspace packages/server

      - name: Build platform binaries via Bun (cross-compile)
        run: npm run build:platforms --workspace packages/server

      - name: Upload server binaries to GitHub Release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p 'require("./packages/server/package.json").version')
          TAG="v${VERSION}"
          for attempt in 1 2 3; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              for pkg in darwin-x64 darwin-arm64 win32-x64 linux-x64; do
                bin_dir="packages/server/publish-packages/$pkg/bin"
                src=$(ls "$bin_dir"/embeddedcowork-server* 2>/dev/null | head -1)
                if [ -n "$src" ]; then
                  ext=""
                  [ "$pkg" = "win32-x64" ] && ext=".exe"
                  asset_name="embeddedcowork-server-${VERSION}-${pkg}${ext}"
                  cp "$src" "/tmp/$asset_name"
                  gh release upload "$TAG" "/tmp/$asset_name" --clobber
                fi
              done
              break
            fi
            sleep 10
          done

      - name: Publish platform packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; attempting npm trusted publishing (OIDC)"
            unset NODE_AUTH_TOKEN
          fi
          for pkg in darwin-x64 darwin-arm64 win32-x64 linux-x64; do
            npm publish --workspace packages/server/publish-packages/$pkg \
              --access public --provenance || true
          done

      - name: Publish wrapper package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; attempting npm trusted publishing (OIDC)"
            unset NODE_AUTH_TOKEN
          fi
          npm publish --workspace packages/server \
            --access public --provenance
